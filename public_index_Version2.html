<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1E88E5" />

  <!-- Apple iOS support (no automatic install prompt) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Emotion Compass" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />

  <!-- Optional: iOS splash screens (many sizes) -->
  <!-- Generate splash images (see notes) and include link rel="apple-touch-startup-image" tags per device resolution -->

  <!-- Prevent Safari from zooming on input interactions -->
  <meta name="format-detection" content="telephone=no" />
</head>
